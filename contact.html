<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Crypto Wallah</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <h1>Currency Converter</h1>

        <div class="menu-toggle" id="menu-toggle">
          <i class="fa-solid fa-bars"></i>
        </div>

        <nav>
          <ul id="nav-links">
            <li><a href="main.html">Home</a></li>
            <li><a href="main.html#about">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li id="auth-area">
              <a href="login.html" id="login-link">Login</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <section class="contact-section">
      <div class="contact-container">
        <h2>Contact Us</h2>
        <p>Send us a message</p>

        <form
          id="contact-form"
          action="https://formspree.io/f/xgonveak"
          method="POST"
        >
          <div class="form-group">
            <label>Name</label>
            <input
              placeholder="Enter Your Name"
              type="text"
              name="name"
              required
            />
          </div>

          <div class="form-group">
            <label>Email</label>
            <input
              placeholder="Enter Your Email"
              type="email"
              name="email"
              required
            />
          </div>

          <div class="form-group">
            <label>Message</label>
            <textarea
              placeholder="Enter Your Message"
              name="message"
              rows="5"
              required
            ></textarea>
          </div>

          <button type="submit" class="btn">Send Message</button>

          <div class="success-msg" id="success-msg">
            Message sent successfully!
          </div>
        </form>
      </div>
    </section>

    <footer>
      <div class="container-2">
        <nav>
          <ul>
            <p>&copy; 2026 Coin Tracker. All Rights Reserved.</p>
          </ul>
        </nav>
      </div>
    </footer>

    <script>
      /* HAMBURGER */
      const toggle = document.getElementById("menu-toggle");
      const nav = document.getElementById("nav-links");

      if (toggle && nav) {
        toggle.addEventListener("click", () => {
          nav.classList.toggle("active");
        });

        document.addEventListener("click", (e) => {
          if (!nav.contains(e.target) && !toggle.contains(e.target)) {
            nav.classList.remove("active");
          }
        });
      }

      /* PROFILE SYSTEM */
      document.addEventListener("DOMContentLoaded", function () {
        const authArea = document.getElementById("auth-area");
        const storedName = localStorage.getItem("name");
        const isLoggedIn = localStorage.getItem("isLoggedIn");

        if (authArea && storedName && isLoggedIn) {
          const firstLetter = storedName.charAt(0).toUpperCase();

          authArea.innerHTML = `
            <div class="profile-menu" id="profileMenu">
              <div class="profile-avatar">${firstLetter}</div>
              <span>${storedName}</span>
              <div class="profile-dropdown">
                <a href="#">My Profile</a>
                <a href="#" id="logoutBtn">Logout</a>
              </div>
            </div>
          `;

          const profileMenu = document.getElementById("profileMenu");

          if (profileMenu) {
            profileMenu.addEventListener("click", function (e) {
              e.stopPropagation();
              profileMenu.classList.toggle("active");
            });
          }

          const logoutBtn = document.getElementById("logoutBtn");

          if (logoutBtn) {
            logoutBtn.addEventListener("click", function (e) {
              e.preventDefault();
              e.stopPropagation();
              localStorage.removeItem("isLoggedIn");
              localStorage.removeItem("name");
              localStorage.removeItem("email");
              alert("Logged Out!");
              window.location.href = "login.html";
            });
          }

          document.addEventListener("click", function () {
            if (profileMenu) {
              profileMenu.classList.remove("active");
            }
          });
        }
      });

      /* CONTACT FORM */
      const contactForm = document.getElementById("contact-form");
      const successMsg = document.getElementById("success-msg");

      if (contactForm) {
        contactForm.addEventListener("submit", async function (e) {
          e.preventDefault();

          const name = contactForm.querySelector('input[name="name"]').value;
          const email = contactForm.querySelector('input[name="email"]').value;
          const message = contactForm.querySelector(
            'textarea[name="message"]',
          ).value;

          const response = await fetch("http://localhost:3005/api/contact", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, message }),
          });

          const data = await response.json();

          if (data.success) {
            successMsg.style.display = "block";
            contactForm.reset();
            setTimeout(() => {
              successMsg.style.display = "none";
            }, 5000);
          } else {
            alert("Failed to send message");
          }
        });
      }
    </script>
  </body>
</html>
